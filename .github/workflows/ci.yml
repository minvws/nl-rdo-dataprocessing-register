name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - develop

jobs:
  CI:
    env:
      DB_CONNECTION: pgsql
      DB_HOST: localhost
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      DB_DATABASE: postgres
      AWS_ENDPOINT: http://localhost:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: eu-central-1
      AWS_USE_PATH_STYLE_ENDPOINT: true
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/cms
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Start MinIO
        run: |
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e "MINIO_ROOT_USER=minioadmin" \
            -e "MINIO_ROOT_PASSWORD=minioadmin" \
            minio/minio:RELEASE.2025-02-28T09-55-16Z \
            server /data --console-address ":9001"

          echo "Waiting for MinIO to be ready..."
          timeout 60s bash -c 'until curl -sf http://localhost:9000/minio/health/live >/dev/null 2>&1; do sleep 2; done'
          echo "MinIO is ready!"

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          cache-dependency-path: "**/package-lock.json"

      - name: Install npm dependencies
        run: |
          echo "//npm.pkg.github.com/:_authToken=$NODE_AUTH_TOKEN"  >> ~/.npmrc
          npm ci --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.REPO_READ_ONLY_TOKEN }}

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: pgsql
          coverage: xdebug

      - name: Install exiftool
        run: sudo apt-get update && sudo apt-get install -y exiftool

      - name: Copy env
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Composer install
        env:
          COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.REPO_READ_ONLY_TOKEN }}"}}'
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Prepare application
        run: php artisan key:generate

      - name: Npm build
        run: npm run build

      - name: Clear Config
        run: php artisan config:clear

      - name: Assert unique migration names
        run: ./bin/assert-unique-migration-names

      - name: Move static website hugo template to the app
        working-directory: ./src
        run: |
          mv static-website/ cms/

      - name: Setup MinIO buckets
        run: php artisan minio:setup

      - name: Run Migration
        run: php artisan migrate:fresh

      - name: Phpcs
        run: vendor/bin/phpcs -n

      - name: Phpstan
        run: |
          mkdir -p reports
          vendor/bin/phpstan analyse --error-format=json > reports/phpstan.json

      - name: Phpmd
        run: vendor/bin/phpmd app github ./phpmd.xml

      - name: Phpunit
        run: vendor/bin/pest --coverage --min=100 --log-junit=reports/report-phpunit.xml --coverage-clover=reports/coverage-phpunit.xml

      - name: Run SonarQube scan
        uses: minvws/action-sonarqube@v1
        with:
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          allow-run-on-dependabot: true
          project-base-dir: ./src/cms

      - name: Stop MinIO
        if: always()
        run: docker stop minio && docker rm minio || true
