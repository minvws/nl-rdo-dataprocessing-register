# https://taskfile.dev
version: '3.48.0'

  # ─────────────────────────────────────────────
  # Release automation
  # Gebruik: task release VERSION=v1.2.3 DB_VERSION=v0.0.15
  # ─────────────────────────────────────────────

tasks:
  release:
    desc: "Grotendeels het releaseproces automatiseren. Gebruik: task release VERSION=v1.2.3 DB_VERSION=v0.0.15"
    cmds:
      - task: release:validate
        vars: {VERSION: "{{.VERSION}}", DB_VERSION: "{{.DB_VERSION}}"}
      - task: release:branch
        vars: {VERSION: "{{.VERSION}}"}
      - task: release:sql
        vars: {VERSION: "{{.VERSION}}", DB_VERSION: "{{.DB_VERSION}}"}
      - task: release:changelog
        vars: {VERSION: "{{.VERSION}}", DB_VERSION: "{{.DB_VERSION}}"}
      - task: release:commit
        vars: {VERSION: "{{.VERSION}}"}
      - task: release:test:clean
        vars: {VERSION: "{{.VERSION}}"}
      - task: release:test:migrate
        vars: {VERSION: "{{.VERSION}}"}

  release:validate:
    desc: Valideer release-argumenten en git-staat
    cmds:
      - |
        if [ -z "{{.VERSION}}" ]; then
          echo "ERROR: VERSION argument is vereist. Gebruik: task release VERSION=v1.2.3 DB_VERSION=v0.0.15"
          exit 1
        fi
        if [ -z "{{.DB_VERSION}}" ]; then
          echo "ERROR: DB_VERSION argument is vereist. Gebruik: task release VERSION=v1.2.3 DB_VERSION=v0.0.15"
          exit 1
        fi
        BRANCH=$(git rev-parse --abbrev-ref HEAD)
        if [ "$BRANCH" != "develop" ]; then
          echo "ERROR: Je moet op de 'develop' branch staan (huidige branch: $BRANCH)"
          exit 1
        fi
        if ! git diff --quiet || ! git diff --cached --quiet; then
          echo "ERROR: Working tree is niet schoon. Commit of stash alle wijzigingen eerst."
          exit 1
        fi
        echo "Validatie geslaagd: VERSION={{.VERSION}}, DB_VERSION={{.DB_VERSION}}"

  release:branch:
    desc: Maak release branch aan vanuit develop
    cmds:
      - |
        if git show-ref --verify --quiet refs/heads/release/{{.VERSION}}; then
          echo "Branch release/{{.VERSION}} bestaat al, schakel over..."
          git checkout release/{{.VERSION}}
        else
          git checkout develop
          git pull
          git checkout -b release/{{.VERSION}}
          echo "Branch release/{{.VERSION}} aangemaakt en uitgecheckt."
        fi

  release:sql:
    desc: Verplaats SQL-bestanden van develop naar versie-map en update .db_requirements
    cmds:
      - |
        DEVELOP_DIR="database/sql/develop"
        TARGET_DIR="database/sql/{{.DB_VERSION}}"

        DEVELOP_FILES=$(find "$DEVELOP_DIR" -maxdepth 1 -name "*.sql" -type f | sort)
        if [ -z "$DEVELOP_FILES" ]; then
          echo "Geen SQL-bestanden in develop/ gevonden, stap overgeslagen."
          exit 0
        fi

        mkdir -p "$TARGET_DIR"

        # Bepaal hoogste bestaande volgnummer in doelmap
        EXISTING_MAX=0
        for f in "$TARGET_DIR"/[0-9]*.sql; do
          [ -f "$f" ] || continue
          NUM=$(basename "$f" | grep -oE '^[0-9]+' | sed 's/^0*//')
          NUM=${NUM:-0}
          if [ "$NUM" -gt "$EXISTING_MAX" ]; then
            EXISTING_MAX=$NUM
          fi
        done

        # Verplaats develop-bestanden met oplopende nummering
        NEXT=$((EXISTING_MAX + 1))
        for f in $DEVELOP_FILES; do
          BASENAME=$(basename "$f")
          SUFFIX=$(echo "$BASENAME" | sed 's/^[0-9]*-//')
          NEW_NUM=$(printf "%04d" $NEXT)
          NEW_NAME="${NEW_NUM}-${SUFFIX}"
          echo "  Verplaats: $BASENAME -> $TARGET_DIR/$NEW_NAME"
          git mv "$f" "$TARGET_DIR/$NEW_NAME"
          NEXT=$((NEXT + 1))
        done

        echo "{{.DB_VERSION}}" > .db_requirements
        echo ".db_requirements bijgewerkt naar {{.DB_VERSION}}"

        echo "Controleer ook of composer.json archive-sectie nieuwe directories bevat."

  release:changelog:
    desc: Voeg versie-entry toe aan HOSTING_CHANGELOG.md
    cmds:
      - |
        if grep -q "^### {{.VERSION}}" HOSTING_CHANGELOG.md; then
          echo "HOSTING_CHANGELOG.md heeft al een entry voor {{.VERSION}}, stap overgeslagen."
          exit 0
        fi

        # Bepaal of er SQL-bestanden zijn voor de nieuwe DB-versie
        SQL_COUNT=$(find "database/sql/{{.DB_VERSION}}" -name "*.sql" -type f 2>/dev/null | wc -l | tr -d ' ')
        if [ "$SQL_COUNT" -gt 0 ]; then
          ENTRY="### {{.VERSION}}\n\n- Verwerk migraties in \`database/sql\` {{.DB_VERSION}}"
        else
          ENTRY="### {{.VERSION}}\n\n- Geen bijzonderheden"
        fi

        # Voeg entry in vóór ### DEVELOP
        awk -v entry="$ENTRY" '
          /^### DEVELOP/ && !inserted {
            printf "%s\n\n", entry
            inserted=1
          }
          { print }
        ' HOSTING_CHANGELOG.md > HOSTING_CHANGELOG.md.tmp
        mv HOSTING_CHANGELOG.md.tmp HOSTING_CHANGELOG.md

        echo "Entry voor {{.VERSION}} toegevoegd aan HOSTING_CHANGELOG.md."
        echo "Controleer en vul de entry indien nodig aan."

  release:commit:
    desc: Commit alle release-voorbereidingswijzigingen
    cmds:
      - |
        git add -A
        if git diff --cached --quiet; then
          echo "Geen wijzigingen om te committen."
        else
          git commit -m "chore: prepare release {{.VERSION}}"
          echo "Commit aangemaakt voor release {{.VERSION}}."
        fi

  release:test:clean:
    desc: Test schone installatie in geïsoleerde containers
    cmds:
      - |
        set -e
        VERSION_SAFE=$(echo "{{.VERSION}}" | tr '.' '-')
        WORKTREE="/tmp/vwr-clean-${VERSION_SAFE}"
        PROJECT_NAME="vwr-clean-${VERSION_SAFE}"
        DB_NAME="vwr_clean_$(echo "{{.VERSION}}" | tr '.' '_' | tr -d 'v')"

        # Pre-cleanup voor het geval een eerdere run niet goed is opgeruimd
        docker compose --project-name "$PROJECT_NAME" down -v --remove-orphans 2>/dev/null || true
        git worktree remove --force "$WORKTREE" 2>/dev/null || true

        cleanup() {
          echo "--- Opruimen schone-installatie test..."
          docker compose \
            --project-directory "$WORKTREE" \
            --project-name "$PROJECT_NAME" \
            down -v --remove-orphans 2>/dev/null || true
          git worktree remove --force "$WORKTREE" 2>/dev/null || true
          echo "--- Opgeruimd."
        }
        trap cleanup EXIT

        echo ""
        echo "=== Test 1: Schone installatie ({{.VERSION}}) ==="
        echo "    Worktree: $WORKTREE"
        echo "    Project:  $PROJECT_NAME"
        echo "    Database: $DB_NAME"
        echo ""

        git worktree add "$WORKTREE" "$(git rev-parse release/{{.VERSION}})"

        # Stel geïsoleerde .env in
        cp "$WORKTREE/.env.example" "$WORKTREE/.env"
        perl -i -pe "s/DB_DATABASE=.*/DB_DATABASE=${DB_NAME}/" "$WORKTREE/.env"
        perl -i -pe "s/DB_HOST=.*/DB_HOST=pgsql/" "$WORKTREE/.env"
        perl -i -pe "s/DB_USERNAME=.*/DB_USERNAME=sail/" "$WORKTREE/.env"
        perl -i -pe "s/DB_PASSWORD=.*/DB_PASSWORD=password/" "$WORKTREE/.env"
        echo "FORWARD_DB_PORT=15432" >> "$WORKTREE/.env"
        echo "APP_PORT=18080" >> "$WORKTREE/.env"
        echo "VITE_PORT=15173" >> "$WORKTREE/.env"
        echo "FORWARD_MAILPIT_PORT=11025" >> "$WORKTREE/.env"
        echo "FORWARD_MAILPIT_DASHBOARD_PORT=18025" >> "$WORKTREE/.env"
        echo "MINIO_PORT=19000" >> "$WORKTREE/.env"
        echo "MINIO_CONSOLE_PORT=19001" >> "$WORKTREE/.env"
        echo "WWWUSER=$(id -u)" >> "$WORKTREE/.env"
        echo "WWWGROUP=$(id -g)" >> "$WORKTREE/.env"

        # composer install
        echo "--- composer install ---"
        docker run --rm \
          -u "$(id -u):$(id -g)" \
          -v "${WORKTREE}:/var/www/html" \
          -w /var/www/html \
          -e TELESCOPE_ENABLED=false \
          composer:latest \
          composer install --ignore-platform-reqs

        # Start geïsoleerde pgsql
        docker compose \
          --project-directory "$WORKTREE" \
          --project-name "$PROJECT_NAME" \
          up -d pgsql

        # Wacht op pgsql
        echo "Wachten op PostgreSQL..."
        for i in $(seq 1 30); do
          docker compose \
            --project-directory "$WORKTREE" \
            --project-name "$PROJECT_NAME" \
            exec -T pgsql pg_isready -U sail -d "$DB_NAME" -q 2>/dev/null && break || true
          sleep 2
        done

        # Start web (zonder depends_on services — alleen pgsql nodig voor migraties)
        docker compose \
          --project-directory "$WORKTREE" \
          --project-name "$PROJECT_NAME" \
          up -d --no-deps web
        sleep 3

        # Genereer app key
        docker compose \
          --project-directory "$WORKTREE" \
          --project-name "$PROJECT_NAME" \
          exec -T web php artisan key:generate

        # migrate:fresh --seed
        echo "--- php artisan migrate:fresh --seed ---"
        docker compose \
          --project-directory "$WORKTREE" \
          --project-name "$PROJECT_NAME" \
          exec -T web php artisan migrate:fresh --seed

        # npm ci && npm run build
        echo "--- npm ci && npm run build ---"
        docker compose \
          --project-directory "$WORKTREE" \
          --project-name "$PROJECT_NAME" \
          exec -T web npm ci
        docker compose \
          --project-directory "$WORKTREE" \
          --project-name "$PROJECT_NAME" \
          exec -T web npm run build

        echo ""
        echo "Test 1 geslaagd: schone installatie werkt correct."
        echo "Admin login: admin@minvws.nl / admin (OTP: elk 6-cijferig getal)"

  release:test:migrate:
    desc: Test incrementele migratie vanuit vorige versie in geïsoleerde containers
    cmds:
      - |
        set -e
        VERSION_SAFE=$(echo "{{.VERSION}}" | tr '.' '-')
        WORKTREE="/tmp/vwr-migrate-${VERSION_SAFE}"
        PROJECT_NAME="vwr-migrate-${VERSION_SAFE}"
        DB_NAME="vwr_migrate_$(echo "{{.VERSION}}" | tr '.' '_' | tr -d 'v')"

        # Zoek laatste stabiele tag (geen rc/alpha/beta)
        PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
        if [ -z "$PREV_TAG" ]; then
          echo "Geen vorige stabiele tag gevonden, migratie-test overgeslagen."
          exit 0
        fi

        # Pre-cleanup
        docker compose --project-name "$PROJECT_NAME" down -v --remove-orphans 2>/dev/null || true
        git worktree remove --force "$WORKTREE" 2>/dev/null || true

        cleanup() {
          echo "--- Opruimen migratie-test..."
          docker compose \
            --project-directory "$WORKTREE" \
            --project-name "$PROJECT_NAME" \
            down -v --remove-orphans 2>/dev/null || true
          git worktree remove --force "$WORKTREE" 2>/dev/null || true
          echo "--- Opgeruimd."
        }
        trap cleanup EXIT

        echo ""
        echo "=== Test 2: Incrementele migratie ($PREV_TAG -> {{.VERSION}}) ==="
        echo "    Worktree: $WORKTREE"
        echo "    Project:  $PROJECT_NAME"
        echo "    Database: $DB_NAME"
        echo ""

        # Worktree met vorige versie
        git worktree add "$WORKTREE" "$PREV_TAG"

        # Stel geïsoleerde .env in
        cp "$WORKTREE/.env.example" "$WORKTREE/.env"
        perl -i -pe "s/DB_DATABASE=.*/DB_DATABASE=${DB_NAME}/" "$WORKTREE/.env"
        perl -i -pe "s/DB_HOST=.*/DB_HOST=pgsql/" "$WORKTREE/.env"
        perl -i -pe "s/DB_USERNAME=.*/DB_USERNAME=sail/" "$WORKTREE/.env"
        perl -i -pe "s/DB_PASSWORD=.*/DB_PASSWORD=password/" "$WORKTREE/.env"
        echo "FORWARD_DB_PORT=15433" >> "$WORKTREE/.env"
        echo "APP_PORT=18081" >> "$WORKTREE/.env"
        echo "VITE_PORT=15174" >> "$WORKTREE/.env"
        echo "FORWARD_MAILPIT_PORT=11026" >> "$WORKTREE/.env"
        echo "FORWARD_MAILPIT_DASHBOARD_PORT=18026" >> "$WORKTREE/.env"
        echo "MINIO_PORT=19002" >> "$WORKTREE/.env"
        echo "MINIO_CONSOLE_PORT=19003" >> "$WORKTREE/.env"
        echo "WWWUSER=$(id -u)" >> "$WORKTREE/.env"
        echo "WWWGROUP=$(id -g)" >> "$WORKTREE/.env"

        # composer install voor vorige versie
        echo "--- composer install ($PREV_TAG) ---"
        docker run --rm \
          -u "$(id -u):$(id -g)" \
          -v "${WORKTREE}:/var/www/html" \
          -w /var/www/html \
          -e TELESCOPE_ENABLED=false \
          composer:latest \
          composer install --ignore-platform-reqs

        # Start geïsoleerde pgsql
        docker compose \
          --project-directory "$WORKTREE" \
          --project-name "$PROJECT_NAME" \
          up -d pgsql

        # Wacht op pgsql
        echo "Wachten op PostgreSQL..."
        for i in $(seq 1 30); do
          docker compose \
            --project-directory "$WORKTREE" \
            --project-name "$PROJECT_NAME" \
            exec -T pgsql pg_isready -U sail -d "$DB_NAME" -q 2>/dev/null && break || true
          sleep 2
        done

        # Start web
        docker compose \
          --project-directory "$WORKTREE" \
          --project-name "$PROJECT_NAME" \
          up -d --no-deps web
        sleep 3

        docker compose \
          --project-directory "$WORKTREE" \
          --project-name "$PROJECT_NAME" \
          exec -T web php artisan key:generate

        # Verwijder develop/ scripts: productie heeft nooit WIP-migraties,
        # zodat de versioned migraties van de release puur worden getest.
        rm -rf "$WORKTREE/database/sql/develop"

        echo "--- migrate:fresh --seed op $PREV_TAG ---"
        docker compose \
          --project-directory "$WORKTREE" \
          --project-name "$PROJECT_NAME" \
          exec -T web php artisan migrate:fresh --seed

        # Schakel worktree naar nieuwe release branch
        echo "--- Overschakelen naar release/{{.VERSION}} ---"
        git -C "$WORKTREE" checkout "$(git rev-parse release/{{.VERSION}})"

        # composer install voor nieuwe versie
        echo "--- composer install (release/{{.VERSION}}) ---"
        docker run --rm \
          -u "$(id -u):$(id -g)" \
          -v "${WORKTREE}:/var/www/html" \
          -w /var/www/html \
          -e TELESCOPE_ENABLED=false \
          composer:latest \
          composer install --ignore-platform-reqs

        # Incrementele migratie
        echo "--- php artisan migrate (incrementeel) ---"
        docker compose \
          --project-directory "$WORKTREE" \
          --project-name "$PROJECT_NAME" \
          exec -T web php artisan migrate

        echo ""
        echo "Test 2 geslaagd: incrementele migratie werkt correct."
