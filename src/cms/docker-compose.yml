services:
    web:
        image: sail-8.4-hugo/app
        build:
            context: ./vendor/laravel/sail/runtimes/8.4
            dockerfile: ../../../../../Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
            COMPOSER_ROOT_VERSION: 'dev-develop'
        volumes:
            - '.:/var/www/html'
            - '../static-website:/var/www/html/static-website'
            - '../../.db_requirements:/var/www/html/storage/app/sql-generation-management/.db_requirements'
        networks:
            - sail
        depends_on:
            - pgsql
            - clamav
            - minio-setup

    pgsql:
        image: 'postgres:15'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s

    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail

    clamav:
        image: 'clamav/clamav'
        networks:
            - sail
        platform: 'linux/amd64'

    minio:
        image: 'minio/minio:RELEASE.2025-09-07T16-13-09Z'
        ports:
            - '${MINIO_PORT:-9000}:9000'
            - '${MINIO_CONSOLE_PORT:-9001}:9001'
        environment:
            MINIO_ROOT_USER: '${MINIO_ROOT_USER:-minioadmin}'
            MINIO_ROOT_PASSWORD: '${MINIO_ROOT_PASSWORD:-minioadmin}'
        volumes:
            - 'sail-minio:/minio_root'
        networks:
            - sail
        command: minio server /minio_root --console-address ":9001"
        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
            interval: 30s
            timeout: 20s
            retries: 3

    minio-setup:
        image: sail-8.4/app
        depends_on:
            minio:
                condition: service_healthy
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                php artisan minio:setup
                exit 0

networks:
    sail:
        driver: bridge

volumes:
    sail-pgsql:
        driver: local
    sail-minio:
        driver: local
